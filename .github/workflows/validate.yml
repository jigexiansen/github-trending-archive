name: Validate Reports

on:
  workflow_dispatch:
  push:
    paths:
      - 'reports/**'
  pull_request:
    paths:
      - 'reports/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check filename convention (DD.html)
        run: |
          failed=0
          while IFS= read -r f; do
            name=$(basename "$f")
            if ! echo "$name" | grep -qE '^[0-9]{2}\.html$'; then
              echo "❌  Bad filename: $f  (expected DD.html, e.g. 28.html)"
              failed=1
            fi
          done < <(find reports -name "*.html")
          [ $failed -eq 0 ] && echo "✅  All filenames match DD.html"
          exit $failed

      - name: Check directory structure (reports/YYYY/MM/DD.html)
        run: |
          failed=0
          while IFS= read -r f; do
            day=$(basename "$f" .html)
            month=$(basename "$(dirname "$f")")
            year=$(basename "$(dirname "$(dirname "$f")")")
            if ! echo "$year"  | grep -qE '^[0-9]{4}$' \
               || ! echo "$month" | grep -qE '^(0[1-9]|1[0-2])$' \
               || ! echo "$day"   | grep -qE '^(0[1-9]|[12][0-9]|3[01])$'; then
              echo "❌  Wrong location: $f  (expected reports/YYYY/MM/DD.html)"
              failed=1
            fi
          done < <(find reports -name "*.html")
          [ $failed -eq 0 ] && echo "✅  All reports are in the correct directory"
          exit $failed
